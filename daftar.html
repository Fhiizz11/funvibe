<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance</title>
</head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #d0d2d9;
    color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 500px;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(10px);
}

.maintenance-img {
    width: 80%;
    max-width: 300px;
    margin-bottom: 20px;
    border-radius: 10px;
}

h1 {
    font-size: 24px;
    margin-bottom: 10px;
    font-weight: 600;
}

p {
    font-size: 16px;
    margin-bottom: 20px;
}

.contact p {
    font-weight: 600;
    margin-bottom: 5px;
}

.contact a {
    display: block;
    text-decoration: none;
    color: black;
    font-weight: 400;
    margin-top: 5px;
    transition: 0.3s;
}

.contact a:hover {
    text-decoration: underline;
}

/* Responsif */
@media (max-width: 480px) {
    .container {
        padding: 20px;
    }

    h1 {
        font-size: 20px;
    }

    p {
        font-size: 14px;
    }
}
</style>

<body>
    <div class="container">
        <div class="content">
            <img src="https://files.catbox.moe/vo19pg.webp" alt="Maintenance" class="maintenance-img">
            <h1>Form Pendaftaran Belum Dibuka</h1>
            <p>Kami sedang melakukan pemeliharaan untuk meningkatkan layanan. Silakan kembali lagi nanti.</p>
            <div class="contact">
                <p>Hubungi Kami:</p>
                <a href="https://instagram.com/funvibeplayfest" class="email">@funvibeplayfest</a>
            </div>
        </div>
    </div>
</body>
</html>
